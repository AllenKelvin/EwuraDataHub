services:
  - type: web
    name: ewura-hub-api
    runtime: node
    plan: standard
    buildCommand: cd backend/api-server && pnpm install && pnpm build
    startCommand: cd backend/api-server && pnpm start
    envVars:
      - key: ENABLE_PNPM
        value: "true"
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        fromDatabase:
          name: ewura-hub-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: JWT_SECRET
        scope: all
      - key: JWT_EXPIRY
        value: "7d"
      - key: LOG_LEVEL
        value: info
      - key: FRONTEND_URL
        scope: all
      - key: CORS_ORIGIN
        scope: all
      - key: PAYSTACK_PUBLIC_KEY
        scope: all
      - key: PAYSTACK_SECRET_KEY
        scope: all
      # Vendor API (AllenDataHub Integration)
      - key: VENDOR_API_KEY
        scope: all
      - key: VENDOR_API_URL
        value: https://api.allendatahub.com

databases:
  - name: ewura-hub-db
    plan: standard
    databaseName: ewura-hub-prod
    ipAllowList:
      - source: 0.0.0.0/0
        description: Allow all IPs

autoDeploy: true
