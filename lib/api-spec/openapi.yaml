openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Ewura Hub API - Airtime & Data selling platform
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: orders
    description: Orders management
  - name: wallet
    description: Agent wallet
  - name: products
    description: Network products and pricing
  - name: payments
    description: Paystack payments
  - name: admin
    description: Admin operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user or agent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /products:
    get:
      operationId: getProducts
      tags: [products]
      summary: Get network products and pricing
      parameters:
        - name: network
          in: query
          schema:
            type: string
            enum: [MTN, Telecel, AirtelTigo]
        - name: type
          in: query
          schema:
            type: string
            enum: [airtime, data]
      responses:
        "200":
          description: Products list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /orders:
    get:
      operationId: getOrders
      tags: [orders]
      summary: Get orders (current user's or all for admin)
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, processing, completed, failed]
        - name: network
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: page
          in: query
          schema:
            type: integer
            default: 1
      responses:
        "200":
          description: Orders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrdersResponse"

    post:
      operationId: createOrder
      tags: [orders]
      summary: Create a new order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderBody"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderWithPayment"
        "400":
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get a single order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /wallet:
    get:
      operationId: getWallet
      tags: [wallet]
      summary: Get agent wallet balance and info
      responses:
        "200":
          description: Wallet info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallet"

  /wallet/fund:
    post:
      operationId: fundWallet
      tags: [wallet]
      summary: Fund agent wallet (initiates Paystack payment)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FundWalletBody"
      responses:
        "200":
          description: Payment initialized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaystackInitResponse"

  /wallet/transactions:
    get:
      operationId: getWalletTransactions
      tags: [wallet]
      summary: Get wallet transaction history
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: page
          in: query
          schema:
            type: integer
            default: 1
      responses:
        "200":
          description: Transactions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionsResponse"

  /payments/initialize:
    post:
      operationId: initializePayment
      tags: [payments]
      summary: Initialize a Paystack payment for an order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InitPaymentBody"
      responses:
        "200":
          description: Payment initialized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaystackInitResponse"

  /payments/verify/{reference}:
    get:
      operationId: verifyPayment
      tags: [payments]
      summary: Verify a Paystack payment
      parameters:
        - name: reference
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Payment verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentVerifyResponse"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get admin dashboard stats
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/orders:
    get:
      operationId: getAdminOrders
      tags: [admin]
      summary: Get all orders (admin)
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: network
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: page
          in: query
          schema:
            type: integer
            default: 1
      responses:
        "200":
          description: All orders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrdersResponse"

  /admin/products:
    get:
      operationId: getAdminProducts
      tags: [admin]
      summary: Get all products (admin)
      parameters:
        - name: network
          in: query
          schema:
            type: string
            enum: [MTN, Telecel, AirtelTigo]
        - name: type
          in: query
          schema:
            type: string
            enum: [airtime, data]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: page
          in: query
          schema:
            type: integer
            default: 1
      responses:
        "200":
          description: Products list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminProductsResponse"
    post:
      operationId: createProduct
      tags: [admin]
      summary: Create a new product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductBody"
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
  /admin/products/{id}:
    put:
      operationId: updateProduct
      tags: [admin]
      summary: Update a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductBody"
      responses:
        "200":
          description: Product updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [admin]
      summary: Delete a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Product deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /admin/agents:
    get:
      operationId: getAdminAgents
      tags: [admin]
      summary: Get all agents for admin
      parameters:
        - name: verified
          in: query
          schema:
            type: boolean
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: page
          in: query
          schema:
            type: integer
            default: 1
      responses:
        "200":
          description: Agents list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentsResponse"

  /admin/agents/{id}/verify:
    patch:
      operationId: verifyAgent
      tags: [admin]
      summary: Verify or unverify an agent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyAgentBody"
      responses:
        "200":
          description: Agent updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /admin/agents/{id}/balance:
    patch:
      operationId: adjustAgentBalance
      tags: [admin]
      summary: Adjust agent wallet balance
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdjustBalanceBody"
      responses:
        "200":
          description: Balance adjusted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallet"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required: [error]

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    User:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        email:
          type: string
        phone:
          type: string
        role:
          type: string
          enum: [user, agent, admin]
        isVerified:
          type: boolean
        walletBalance:
          type: number
        createdAt:
          type: string
          format: date-time
      required: [id, username, email, phone, role, isVerified, walletBalance, createdAt]

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        message:
          type: string
      required: [user, message]

    RegisterBody:
      type: object
      properties:
        username:
          type: string
          minLength: 3
        email:
          type: string
          format: email
        phone:
          type: string
        password:
          type: string
          minLength: 6
        role:
          type: string
          enum: [user, agent]
          default: user
      required: [username, email, phone, password]

    LoginBody:
      type: object
      properties:
        emailOrPhone:
          type: string
        password:
          type: string
      required: [emailOrPhone, password]

    Product:
      type: object
      properties:
        id:
          type: string
        network:
          type: string
          enum: [MTN, Telecel, AirtelTigo]
        type:
          type: string
          enum: [airtime, data]
        name:
          type: string
        description:
          type: string
        userPrice:
          type: number
        agentPrice:
          type: number
        value:
          type: string
        dataAmount:
          type: string
        vendorProductId:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, network, type, name, userPrice, agentPrice, value, dataAmount, description, createdAt]

    CreateProductBody:
      type: object
      properties:
        name:
          type: string
        network:
          type: string
          enum: [MTN, Telecel, AirtelTigo]
        type:
          type: string
          enum: [airtime, data]
        dataAmount:
          type: string
        userPrice:
          type: number
        agentPrice:
          type: number
        description:
          type: string
        vendorProductId:
          type: string
      required: [name, network, type, dataAmount, userPrice, agentPrice, description]

    UpdateProductBody:
      type: object
      properties:
        name:
          type: string
        network:
          type: string
          enum: [MTN, Telecel, AirtelTigo]
        type:
          type: string
          enum: [airtime, data]
        dataAmount:
          type: string
        userPrice:
          type: number
        agentPrice:
          type: number
        description:
          type: string
        vendorProductId:
          type: string

    AdminProductsResponse:
      type: object
      properties:
        products:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        total:
          type: integer
        page:
          type: integer
        pages:
          type: integer
      required: [products, total, page, pages]

    Order:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        username:
          type: string
        network:
          type: string
          enum: [MTN, Telecel, AirtelTigo]
        type:
          type: string
          enum: [airtime, data]
        productName:
          type: string
        recipientPhone:
          type: string
        amount:
          type: number
        status:
          type: string
          enum: [pending, processing, completed, failed]
        paymentMethod:
          type: string
          enum: [paystack, wallet]
        paymentReference:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, userId, username, network, type, productName, recipientPhone, amount, status, paymentMethod, createdAt]

    OrderWithPayment:
      type: object
      properties:
        order:
          $ref: "#/components/schemas/Order"
        paymentUrl:
          type: string
        reference:
          type: string
        message:
          type: string
      required: [order, message]

    OrdersResponse:
      type: object
      properties:
        orders:
          type: array
          items:
            $ref: "#/components/schemas/Order"
        total:
          type: integer
        page:
          type: integer
        pages:
          type: integer
      required: [orders, total, page, pages]

    CreateOrderBody:
      type: object
      properties:
        productId:
          type: string
        recipientPhone:
          type: string
        paymentMethod:
          type: string
          enum: [paystack, wallet]
      required: [productId, recipientPhone, paymentMethod]

    Wallet:
      type: object
      properties:
        balance:
          type: number
        userId:
          type: string
        totalFunded:
          type: number
        totalSpent:
          type: number
      required: [balance, userId, totalFunded, totalSpent]

    FundWalletBody:
      type: object
      properties:
        amount:
          type: number
          minimum: 1
      required: [amount]

    WalletTransaction:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [credit, debit]
        amount:
          type: number
        description:
          type: string
        reference:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, type, amount, description, reference, createdAt]

    TransactionsResponse:
      type: object
      properties:
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/WalletTransaction"
        total:
          type: integer
        page:
          type: integer
        pages:
          type: integer
      required: [transactions, total, page, pages]

    InitPaymentBody:
      type: object
      properties:
        orderId:
          type: string
      required: [orderId]

    PaystackInitResponse:
      type: object
      properties:
        authorizationUrl:
          type: string
        accessCode:
          type: string
        reference:
          type: string
      required: [authorizationUrl, accessCode, reference]

    PaymentVerifyResponse:
      type: object
      properties:
        status:
          type: string
        message:
          type: string
        order:
          $ref: "#/components/schemas/Order"
      required: [status, message]

    AdminStats:
      type: object
      properties:
        totalOrders:
          type: integer
        completedOrders:
          type: integer
        pendingOrders:
          type: integer
        totalRevenue:
          type: number
        totalAgents:
          type: integer
        verifiedAgents:
          type: integer
        totalUsers:
          type: integer
        recentOrders:
          type: array
          items:
            $ref: "#/components/schemas/Order"
      required: [totalOrders, completedOrders, pendingOrders, totalRevenue, totalAgents, verifiedAgents, totalUsers, recentOrders]

    AgentsResponse:
      type: object
      properties:
        agents:
          type: array
          items:
            $ref: "#/components/schemas/User"
        total:
          type: integer
        page:
          type: integer
        pages:
          type: integer
      required: [agents, total, page, pages]

    VerifyAgentBody:
      type: object
      properties:
        isVerified:
          type: boolean
      required: [isVerified]

    AdjustBalanceBody:
      type: object
      properties:
        amount:
          type: number
        type:
          type: string
          enum: [credit, debit]
        reason:
          type: string
      required: [amount, type, reason]
